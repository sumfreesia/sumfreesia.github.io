<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>課程簽到系統</title>

<!-- App化 -->
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="簽到">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0f14">

<style>
body{
  background:#0d0f14;
  color:#fff;
  font-family:sans-serif;
  padding:20px;
}
h1{font-size:22px;margin-bottom:10px;}
.date{color:#aaa;margin-bottom:20px;}
.card{
  background:#1c2030;
  border-radius:12px;
  padding:14px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
}
.card.checked{
  background:#1f3a2f;
}
.btn{
  width:24px;height:24px;
  border-radius:50%;
  border:2px solid #555;
}
.card.checked .btn{
  background:#3ecf8e;
  border-color:#3ecf8e;
}
</style>
</head>

<body>

<h1>課程簽到</h1>
<div class="date" id="date"></div>

<div class="card" data-id="skate">直排輪 <div class="btn"></div></div>
<div class="card" data-id="math">數學 <div class="btn"></div></div>
<div class="card" data-id="english">英文 <div class="btn"></div></div>

<script>
// ===== 日期 =====
const dateEl = document.getElementById("date");
const today = new Date();
dateEl.innerText = today.toLocaleDateString();

// ===== localStorage =====
const KEY = "checkin";

function getKey(){
  return new Date().toISOString().split("T")[0];
}

function load(){
  return JSON.parse(localStorage.getItem(KEY) || "{}");
}

function save(data){
  localStorage.setItem(KEY, JSON.stringify(data));
}

function toggle(id){
  const data = load();
  const d = getKey();
  if(!data[d]) data[d] = {};
  data[d][id] = !data[d][id];
  save(data);
}

function render(){
  const data = load();
  const d = getKey();

  document.querySelectorAll(".card").forEach(el=>{
    const id = el.dataset.id;
    if(data[d] && data[d][id]){
      el.classList.add("checked");
    }else{
      el.classList.remove("checked");
    }
  });
}

// 點擊
document.querySelectorAll(".card").forEach(el=>{
  el.addEventListener("click",()=>{
    toggle(el.dataset.id);
    render();
  });
});

render();

// ===== Service Worker =====
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
